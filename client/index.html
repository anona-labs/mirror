<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mirror</title>
  <script>
    // Set theme before paint to avoid a flash. Dark is the default.
    (function () {
      try {
        var t = localStorage.getItem("mirror-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="stylesheet" href="/vendor/highlight-github-dark.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">&#129694;</span>
      <span class="title">Mirror</span>
    </div>
    <div class="bar-right">
      <span class="status" id="status">
        <span class="dot" id="dot"></span>
        <span id="status-text">connecting</span>
      </span>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle theme" title="Toggle theme"></button>
    </div>
  </header>

  <main id="conversation" class="conversation">
    <div class="empty" id="empty">Waiting for the conversation&hellip;</div>
  </main>

  <button id="to-bottom" class="to-bottom" type="button" aria-label="Jump to latest" title="Jump to latest" hidden>&#8595;</button>

  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
