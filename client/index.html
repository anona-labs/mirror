<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mirror</title>
  <link rel="stylesheet" href="/vendor/highlight-github-dark.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">&#129694;</span>
      <span class="title">Mirror</span>
    </div>
    <div class="status" id="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">connecting&hellip;</span>
    </div>
  </header>

  <main id="conversation" class="conversation">
    <div class="empty" id="empty">Waiting for the conversation&hellip;</div>
  </main>

  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
